<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="0.55" stop-color="#111c33"/>
      <stop offset="1" stop-color="#0a1626"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="mod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#162132"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="627" fill="url(#bg)"/>

  <!-- faint dotted grid -->
  <g fill="#1e3a5f" opacity="0.35">
    <!-- generated dot field -->
    <g>
      <circle cx="60"  cy="80"  r="1.5"/><circle cx="140" cy="80"  r="1.5"/><circle cx="220" cy="80"  r="1.5"/><circle cx="300" cy="80"  r="1.5"/>
      <circle cx="60"  cy="160" r="1.5"/><circle cx="140" cy="160" r="1.5"/><circle cx="220" cy="160" r="1.5"/><circle cx="300" cy="160" r="1.5"/>
      <circle cx="60"  cy="240" r="1.5"/><circle cx="140" cy="240" r="1.5"/><circle cx="220" cy="240" r="1.5"/><circle cx="300" cy="240" r="1.5"/>
    </g>
  </g>

  <!-- glow blob -->
  <circle cx="980" cy="180" r="220" fill="#1d4ed8" opacity="0.18" filter="url(#soft)"/>
  <circle cx="1050" cy="470" r="180" fill="#7c3aed" opacity="0.15" filter="url(#soft)"/>

  <!-- ===== left: text ===== -->
  <g>
    <text x="72" y="150" fill="#7dd3fc" font-size="22" font-weight="600" letter-spacing="3">CQRS · EVENT SOURCING · JAVA 25</text>

    <text x="70" y="232" fill="#f8fafc" font-size="58" font-weight="800">Kendar Framework</text>

    <text x="72" y="300" fill="#cbd5e1" font-size="27" font-weight="400">An open-source, production-grade</text>
    <text x="72" y="338" fill="#cbd5e1" font-size="27" font-weight="400">alternative to the AxonIQ stack —</text>
    <text x="72" y="376" fill="#cbd5e1" font-size="27" font-weight="400">built in a few weeks.</text>

    <!-- divider -->
    <rect x="72" y="410" width="120" height="4" rx="2" fill="url(#accent)"/>

    <text x="72" y="466" fill="#94a3b8" font-size="21" font-style="italic">What it taught me about the limits</text>
    <text x="72" y="496" fill="#94a3b8" font-size="21" font-style="italic">of AI-assisted coding.</text>

    <text x="72" y="560" fill="#64748b" font-size="18" font-weight="500">github.com/kendarorg/the-cqrses</text>
  </g>

  <!-- ===== right: the strict module stack + event stream ===== -->
  <g transform="translate(800,120)">
    <!-- connecting spine -->
    <line x1="150" y1="40" x2="150" y2="360" stroke="url(#accent)" stroke-width="3" opacity="0.5"/>

    <!-- module blocks (top depends on bottom; one direction) -->
    <g>
      <rect x="40" y="20"  width="270" height="56" rx="10" fill="url(#mod)" stroke="#38bdf8" stroke-opacity="0.5"/>
      <text x="175" y="55" fill="#e2e8f0" font-size="20" font-weight="600" text-anchor="middle">spring · cluster</text>

      <rect x="40" y="105" width="270" height="56" rx="10" fill="url(#mod)" stroke="#60a5fa" stroke-opacity="0.5"/>
      <text x="175" y="140" fill="#e2e8f0" font-size="20" font-weight="600" text-anchor="middle">jdbc · in-memory</text>

      <rect x="40" y="190" width="270" height="56" rx="10" fill="url(#mod)" stroke="#818cf8" stroke-opacity="0.6"/>
      <text x="175" y="225" fill="#e2e8f0" font-size="20" font-weight="600" text-anchor="middle">kernel · contracts</text>

      <rect x="40" y="275" width="270" height="56" rx="10" fill="url(#mod)" stroke="#a78bfa" stroke-opacity="0.6"/>
      <text x="175" y="310" fill="#e2e8f0" font-size="20" font-weight="600" text-anchor="middle">contract suites</text>
    </g>

    <!-- downward dependency arrows -->
    <g stroke="#38bdf8" stroke-width="2" opacity="0.7" fill="none">
      <path d="M175 76  L175 103" marker-end="url(#a)"/>
      <path d="M175 161 L175 188" marker-end="url(#a)"/>
      <path d="M175 246 L175 273" marker-end="url(#a)"/>
    </g>

    <!-- event stream beads -->
    <g fill="#38bdf8">
      <circle cx="-30" cy="48"  r="6"/><circle cx="-10" cy="48" r="6" opacity="0.8"/><circle cx="10" cy="48" r="6" opacity="0.55"/>
    </g>
  </g>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0 0 L6 5 L0 10 Z" fill="#38bdf8" opacity="0.9"/>
    </marker>
  </defs>
</svg>
